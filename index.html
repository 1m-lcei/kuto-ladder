<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
  <title>戦術対抗戦 経路</title>
  <meta name="description" content="戦術対抗戦 (PvP) の順位経路を計算・表示するWebアプリケーションです。" />
  <meta property="og:title" content="戦術対抗戦 経路" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://1m-lcei.github.io/kuto-ladder/" />
  <meta property="og:description" content="戦術対抗戦 (PvP) の順位経路を計算・表示するWebアプリケーションです。" />
  <meta property="og:locale" content="ja_JP" />
  <script>
    try {
      const conf = localStorage.getItem('kuto-ladder-config');
      if (conf) {
        const parsed = JSON.parse(conf);
        if (parsed.version === 1 && parsed.theme) {
          document.documentElement.setAttribute('data-theme', parsed.theme);
          const meta = document.querySelector('meta[name="color-scheme"]');
          if (meta) meta.setAttribute('content', parsed.theme === 'night' ? 'dark' : 'light');
        }
      }
    } catch {}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/app/main.tsx"></script>
</body>

</html>
